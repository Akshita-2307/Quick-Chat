<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="login">
            <div>
                <h1>Quick Chat</h1>
            </div>
            <div class="description">Connect with your loved ones instantly</div>
            <div class="form">
                <div class="username">Username</div>
                <div class="input"><input type="text" id="username" placeholder="Enter your username"></div>
                <div class="username">Password</div>
                <div class="input"><input type="password" id="password" placeholder="Enter your password"></div>
                <div class="btn" id="loginbtn">Start Chatting</div>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
